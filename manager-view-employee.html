<!DOCTYPE html>
<html>

<head>
    <title>Manager Employee Details</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Employee Details</h1>

<button onclick="window.location.href='manager-employees.html'">
    Back
</button>

<hr>

<p>
    <b>Full Name:</b>
    <span id="fullName"></span>
</p>

<p>
    <b>Email:</b>
    <span id="email"></span>
</p>

<p>
    <b>Age:</b>
    <span id="age"></span>
</p>

<p>
    <b>Department:</b>
    <span id="department"></span>
</p>

<script>

const token =
    localStorage.getItem("token");

if(!token){

    window.location.href =
        "login.html";
}

const params =
    new URLSearchParams(
        window.location.search
    );

const employeeUuid =
    params.get("uuid");

async function loadEmployee(){

    const response = await fetch(
        `http://127.0.0.1:8000/employees/${employeeUuid}`,
        {
            headers:{
                Authorization:
                    `Bearer ${token}`
            }
        }
    );

    const data =
        await response.json();

    console.log(data);

    document.getElementById("fullName")
        .innerText =
        data.full_name;

    document.getElementById("email")
        .innerText =
        data.email;

    document.getElementById("age")
        .innerText =
        data.age;

    document.getElementById("department")
        .innerText =
        data.department.name;
}

loadEmployee();

</script>

</body>
</html>
