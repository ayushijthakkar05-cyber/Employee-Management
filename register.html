<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Employee Management System</h1>

    <h2>Register</h2>

    <input id="username" placeholder="Username">
    <p id="usernameError" class="error"></p>

    <input id="email" placeholder="Email">
    <p id="emailError" class="error"></p>

    <input
    id="password"
    type="password"
    placeholder="Password"
>   <p id="passwordError" class="error"></p>

   <input
    id="confirmPassword"
    type="password"
    placeholder="Confirm Password"
>   <p id="confirmPasswordError" class="error"></p>

    <select id="roleId">
        
        <option value="2">Manager</option>

        <option value="3">Employee</option>

    </select>

    <br><br>

    <button onclick="register()">
        Register
    </button>

    <br><br>

    <a href="login.html">
        Already Registered? Login
    </a>

    <p id="result"></p>

</body>
</html>

<script>

async function register() {
    const username =
        document.getElementById("username").value;

    const email =
        document.getElementById("email").value;

    const password =
        document.getElementById("password").value;

    const confirmPassword =
        document.getElementById("confirmPassword").value;

    const roleId =
        parseInt(document.getElementById("roleId").value);

    document.getElementById("usernameError").innerText = "";
    document.getElementById("emailError").innerText = "";
    document.getElementById("passwordError").innerText = "";
    document.getElementById("confirmPasswordError").innerText = "";
    document.getElementById("result").innerText = "";

    let valid = true;

    if (!username.trim()) {

        document.getElementById("usernameError").innerText =
            "Username is required.";

        valid = false;
    }

    if (!email.trim()) {

        document.getElementById("emailError").innerText =
            "Email is required.";

        valid = false;
    }

    if (!password) {

        document.getElementById("passwordError").innerText =
            "Password is required.";

        valid = false;
    }

    if (!confirmPassword) {

        document.getElementById("confirmPasswordError").innerText =
            "Please confirm your password.";

        valid = false;
    }

    if (password && confirmPassword && password !== confirmPassword) {

        document.getElementById("confirmPasswordError").innerText =
            "Passwords do not match.";

        valid = false;
    }

    if (!valid) {
        return;
}


    const response = await fetch(
        "http://127.0.0.1:8000/auth/register",
        {
            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                username: username,
                email: email,
                password: password,
                confirmPassword: confirmPassword,
                roleId: roleId
            })
        }
    );

    const data = await response.json();

    console.log(data);

    if (response.ok) {

        localStorage.setItem(
            "email",
            email
        );

        document.getElementById("result").style.color = "green";

        document.getElementById("result").innerHTML = `
        🎉 <b>Registration Successful!</b><br><br>
        An OTP has been sent to your email.<br>
        Please verify your email before logging in.<br><br>
        Redirecting...
        `;

        setTimeout(() => {
            window.location.href =
                "verify-email.html";
        }, 2000);

    } else {
        document.getElementById("result").style.color = "red";
        let errorMessage =
            "Registration Failed";

        if (data.detail) {

            if (
                Array.isArray(data.detail) &&
                data.detail.length > 0
            ) {
                errorMessage =
                    data.detail[0].msg;
            } else {
                errorMessage =
                    data.detail;
            }
        }

        if (Array.isArray(data.detail)) {

    document.getElementById("result").innerText =
        data.detail.map(error => error.msg).join(", ");

}
        else {

            document.getElementById("result").innerText =
                data.detail;
        }
    }
}

</script>
