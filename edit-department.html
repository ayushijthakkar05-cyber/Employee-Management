<!DOCTYPE html>
<html>

<head>
    <title>Edit Department</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Edit Department</h1>

<button onclick="window.location.href='departments.html'">
    Back
</button>

<hr>

<input
    id="departmentName"
    placeholder="Department Name"
>
<br>
<small id="departmentNameError" class="error"></small>

<br><br>

<input
    id="departmentDescription"
    placeholder="Department Description"
>
<br>
<small id="departmentDescriptionError" class="error"></small>

<br><br>

<button onclick="updateDepartment()">
    Update Department
</button>

<p id="message"></p>

<script>

const token = localStorage.getItem("token");

if (!token) {
    window.location.href = "login.html";
}

const params = new URLSearchParams(window.location.search);

const departmentUuid = params.get("uuid");

async function loadDepartment() {

    const response = await fetch(
        `http://127.0.0.1:8000/departments/${departmentUuid}`,
        {
            headers: {
                Authorization: `Bearer ${token}`
            }
        }
    );

    const data = await response.json();

    document.getElementById("departmentName").value =
        data.name;

    document.getElementById("departmentDescription").value =
        data.description ?? "";

}

async function updateDepartment() {

    document.getElementById("message").innerText = "";

    document.getElementById("departmentNameError").innerText = "";
    document.getElementById("departmentDescriptionError").innerText = "";

    const departmentName =
        document.getElementById("departmentName").value.trim();

    const departmentDescription =
        document.getElementById("departmentDescription").value.trim();

    let valid = true;

    if (!departmentName) {

        document.getElementById("departmentNameError").innerText =
            "Department Name is required";

        valid = false;

    }

    if (!valid) {
        return;
    }

    const response = await fetch(
        `http://127.0.0.1:8000/departments/${departmentUuid}`,
        {

            method: "PUT",

            headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`
            },

            body: JSON.stringify({

                name: departmentName,

                description: departmentDescription

            })

        }
    );

    const data = await response.json();

    if (response.ok) {

        document.getElementById("message").innerText =
            data.message + " Redirecting...";

        setTimeout(() => {

            window.location.href =
                "departments.html";

        }, 2000);

    }

    else {

        if (Array.isArray(data.detail)) {

            data.detail.forEach(error => {

                const field =
                    error.loc[error.loc.length - 1];

                if (field === "name") {

                    document.getElementById("departmentNameError").innerText =
                        error.msg;

                }

                else if (field === "description") {

                    document.getElementById("departmentDescriptionError").innerText =
                        error.msg;

                }

            });

        }

        else {

            document.getElementById("message").innerText =
                data.detail;

        }

    }

}

loadDepartment();

</script>

</body>
</html>
