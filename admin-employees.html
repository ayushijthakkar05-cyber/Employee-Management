<!DOCTYPE html>
<html>

<head>
     <title>Admin Employee Management</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Employee Management</h1>

<button onclick="window.location.href='admin-dashboard.html'">
    Back To Dashboard
</button>

<button onclick="logout()">
    Logout
</button>

<hr>

<input
    id="search"
    placeholder="Search Employee"
>

<button onclick="searchEmployees()">
    Search
</button>

<button onclick="window.location.href='create-employee.html'">
    + Create Employee
</button>

<hr>

<table border="1" cellpadding="10">

    <thead>

        <tr>

            <th>Name</th>

            <th>Email</th>

            <th>Age</th>

            <th>Department</th>

            <th>Actions</th>

        </tr>

    </thead>

    <tbody id="employeeTable">

    </tbody>

</table>

<br>
<p id="message"></p>
<button id="previousBtn" onclick="previousPage()">
    Previous
</button>

<span id="pageNumber">
    Page 1
</span>

<button id="nextBtn" onclick="nextPage()">
    Next
</button>

<script>

const token =
    localStorage.getItem("token");

let currentPage = 1;
let totalPages = 1;

if (!token) {

    window.location.href =
        "login.html";
}

async function loadEmployees() {
    document.getElementById("message").innerText = "";
    const search =
        document.getElementById("search").value;

    const response = await fetch(
        `http://127.0.0.1:8000/employees/?page=${currentPage}&limit=5&search=${search}`,
        {
            headers: {
                Authorization: `Bearer ${token}`
            }
        }
    );

    const data =
        await response.json();

        if (data.data.length === 0) {

    document.getElementById("employeeTable").innerHTML =
        `<tr>
            <td colspan="5" style="text-align:center;">
                No Employees Found
            </td>
        </tr>`;
}
else {

    let html = "";

    data.data.forEach(emp => {

        html += `
        <tr>
            <td>${emp.full_name}</td>
            <td>${emp.email}</td>
            <td>${emp.age}</td>
            <td>${emp.department.name}</td>
            <td>
                <button onclick="viewEmployee('${emp.uuid}')">View</button>
                <button onclick="editEmployee('${emp.uuid}')">Edit</button>
                <button onclick="deleteEmployee('${emp.uuid}')">Delete</button>
            </td>
        </tr>
        `;
    });

        document.getElementById("employeeTable").innerHTML = html;
    }
        totalPages = Math.max(1, Math.ceil(data.total / 5));

        document.getElementById("pageNumber").innerText =
        `Page ${currentPage} of ${totalPages}`;

        if (currentPage === 1) {

        document.getElementById("previousBtn").style.display = "none";

    } else {

        document.getElementById("previousBtn").style.display = "inline-block";
    }

    if (currentPage >= totalPages) {

        document.getElementById("nextBtn").style.display = "none";

    } else {

        document.getElementById("nextBtn").style.display = "inline-block";
    }
}

function previousPage() {

    if (currentPage > 1) {

        currentPage--;

        loadEmployees();
    }
}

function nextPage() {

    if (currentPage < totalPages) {

        currentPage++;

        loadEmployees();
    }
}
function searchEmployees() {

    currentPage = 1;

    loadEmployees();
}
function viewEmployee(uuid){

    window.location.href =
        `view-employee.html?uuid=${uuid}`;
}

function editEmployee(uuid){

    window.location.href =
    `edit-employee.html?uuid=${uuid}`;
}

async function deleteEmployee(uuid){

    const confirmDelete =
        confirm("Are you sure you want to delete this employee?");

    if(!confirmDelete){
        return;
    }

    const response = await fetch(
        `http://127.0.0.1:8000/employees/${uuid}`,
        {
            method: "DELETE",

            headers: {
                Authorization: `Bearer ${token}`
            }
        }
    );

    const data =
    await response.json();

document.getElementById("message").style.color = "green";

document.getElementById("message").innerHTML = `
🗑 <b>${data.message}</b>
`;

setTimeout(() => {
    loadEmployees();
}, 1000);
}

function logout(){

    localStorage.removeItem("token");

    window.location.href =
        "login.html";
}

loadEmployees();

</script>

</body>

</html>
