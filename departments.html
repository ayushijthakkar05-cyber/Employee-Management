<!DOCTYPE html>
<html>
<head>
    <title>Department Management</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Department Management</h1>

<button onclick="window.location.href='admin-dashboard.html'">
    Back To Dashboard
</button>

<button onclick="logout()">
    Logout
</button>

<hr>

<button onclick="window.location.href='create-department.html'">
    + Create Department
</button>

<p id="message"></p>
<hr>

<table border="1" cellpadding="10">

    <thead>

        <tr>

            <th>Name</th>

            <th>Description</th>

            <th>Actions</th>

        </tr>

    </thead>

    <tbody id="departmentTable">

    </tbody>

</table>

<script>

const token =
    localStorage.getItem("token");

if (!token) {

    window.location.href =
        "login.html";
}

async function loadDepartments() {

    const response = await fetch(
        "http://127.0.0.1:8000/departments/",
        {
            headers: {
                Authorization: `Bearer ${token}`
            }
        }
    );

    const data =
        await response.json();

    let html = "";

    data.data.forEach(dept => {

        html += `
        <tr>

            <td>${dept.name}</td>

            <td>${dept.description ?? ""}</td>

            <td>

                <button
                    onclick="viewDepartment('${dept.uuid}')">
                    View
                </button>

                <button
                    onclick="editDepartment('${dept.uuid}')">
                    Edit
                </button>

                <button
                    onclick="deleteDepartment('${dept.uuid}')">
                    Delete
                </button>

            </td>

        </tr>
        `;
    });

    document.getElementById("departmentTable")
        .innerHTML = html;
}

function viewDepartment(uuid){

    window.location.href =
        `view-department.html?uuid=${uuid}`;
}

function editDepartment(uuid){

    window.location.href =
        `edit-department.html?uuid=${uuid}`;
}
async function deleteDepartment(uuid){

    document.getElementById("message").innerText = "";

    const response = await fetch(
        `http://127.0.0.1:8000/departments/${uuid}`,
        {
            method: "DELETE",

            headers: {
                Authorization: `Bearer ${token}`
            }
        }
    );

    const data =
        await response.json();

    if(response.ok){

        document.getElementById("message").innerText =
            data.message;

        loadDepartments();

    }
    else{

        document.getElementById("message").innerText =
            data.detail;

    }
}
function logout(){

    localStorage.removeItem("token");

    window.location.href =
        "login.html";
}

loadDepartments();

</script>

</body>
</html>
