<!DOCTYPE html>
<html>

<head>
    <title>Create Employee</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Create Employee</h1>


<button onclick="window.location.href='admin-employees.html'">
    Back
</button>

<hr>

<input id="firstName" placeholder="First Name">
<br>
<small id="firstNameError" class="error"></small>

<br><br>

<input id="lastName" placeholder="Last Name">
<br>
<small id="lastNameError" class="error"></small>

<br><br>

<input id="email" placeholder="Email">
<br>
<small id="emailError" class="error"></small>

<br><br>

<input
    id="age"
    type="number"
    placeholder="Age"
>
<br>
<small id="ageError" class="error"></small>

<br><br>

<select id="departmentId">

</select>
<br>
<small id="departmentError" class="error"></small>

<br><br>

<button onclick="createEmployee()">
    Create Employee
</button>

<p id="message"></p>

<script>

const token = localStorage.getItem("token");

if (!token) {
    window.location.href = "login.html";
}

async function loadDepartments() {

    const response = await fetch(
        "http://127.0.0.1:8000/departments/",
        {
            headers: {
                Authorization: `Bearer ${token}`
            }
        }
    );

    const data = await response.json();

    let options = "";

    data.data.forEach(dept => {

        options += `
            <option value="${dept.id}">
                ${dept.name}
            </option>
        `;

    });

    document.getElementById("departmentId").innerHTML = options;

}

async function createEmployee() {

    document.getElementById("message").innerText = "";

    document.getElementById("firstNameError").innerText = "";
    document.getElementById("lastNameError").innerText = "";
    document.getElementById("emailError").innerText = "";
    document.getElementById("ageError").innerText = "";
    document.getElementById("departmentError").innerText = "";

    const firstName =
        document.getElementById("firstName").value.trim();

    const lastName =
        document.getElementById("lastName").value.trim();

    const email =
        document.getElementById("email").value.trim();

    const age =
        document.getElementById("age").value;

    const department =
        document.getElementById("departmentId").value;

    let valid = true;

    if (!firstName) {

        document.getElementById("firstNameError").innerText =
            "First Name is required";

        valid = false;
    }

    if (!lastName) {

        document.getElementById("lastNameError").innerText =
            "Last Name is required";

        valid = false;
    }

    if (!email) {

        document.getElementById("emailError").innerText =
            "Email is required";

        valid = false;
    }

    if (!age) {

        document.getElementById("ageError").innerText =
            "Age is required";

        valid = false;
    }

    if (!department) {

        document.getElementById("departmentError").innerText =
            "Department is required";

        valid = false;
    }

    if (!valid) {
        return;
    }

    const response = await fetch(
        "http://127.0.0.1:8000/employees/",
        {
            method: "POST",

            headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`
            },

            body: JSON.stringify({

                first_name: firstName,

                last_name: lastName,

                email: email,

                age: parseInt(age),

                department_id: parseInt(department)

            })

        }
    );

    const data = await response.json();

    if (response.ok) {

        document.getElementById("message").innerText =
            data.message + " Redirecting...";

        setTimeout(() => {

            window.location.href =
                "admin-employees.html";

        }, 2000);

    }

    else {

        if (Array.isArray(data.detail)) {

            data.detail.forEach(error => {

                const field =
                    error.loc[error.loc.length - 1];

                if (field === "first_name") {

                    document.getElementById("firstNameError").innerText =
                        error.msg;

                }

                else if (field === "last_name") {

                    document.getElementById("lastNameError").innerText =
                        error.msg;

                }

                else if (field === "email") {

                    document.getElementById("emailError").innerText =
                        error.msg;

                }

                else if (field === "age") {

                    document.getElementById("ageError").innerText =
                        error.msg;

                }

                else if (field === "department_id") {

                    document.getElementById("departmentError").innerText =
                        error.msg;

                }

            });

        }

        else {

            document.getElementById("message").innerText =
                data.detail;

        }

    }

}

loadDepartments();

</script>

</body>

</html>
